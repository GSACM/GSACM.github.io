<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>ACM - Student Organization</title>
    <link rel="stylesheet" type="text/css" href="../CSS/style.css">
    <link rel="icon" type="image/png" href="/Images/ACM.png">
    <script src="../Scripts/header.js"></script>
</head>

<body>
   <primary-header></primary-header>

    <!-- Main Content Section -->
    <div class="container">

        <!-- About ACM Section  -->
        <div id="about-container"></div>

        <!-- Upcoming Events Section -->
        <section id="events">
            <h2>Upcoming Events</h2>
            <ul id="events-list"></ul>
            <script src="Scripts/loadevents.js"></script>
        </section>

        <!-- Join Us Section -->
        <div id="join-container"></div>

        <!-- Contact form -->
        <div class="col-md-8 col-sm-10 col-md-offset-2">
            <div class="contact-card wow fadeInUp" data-wow-delay="0.3s">

                <!-- https://formspree.io/forms/mgvzbgqr/submissions  -->
                <form id="contact-form" action="https://formspree.io/f/mgvzbgqr" method="POST" novalidate>

                    <!-- subject shown in email -->
                    <input type="hidden" name="_subject" value="Portfolio contact from hs14235.github.io">

                    <!-- where to redirect if JS disabled -->
                    <input type="hidden" name="_next" value="https://hs14235.github.io/#contact">

                    <div class="row">

                        <div class="col-sm-6">
                            <div class="form-floating mb-3">
                                <input type="text" id="name_field" name="name" class="form-control fancy-input" placeholder="Your name" required>
                                <label for="name_field">Name</label>
                            </div>
                        </div>

                        <div class="col-sm-6">
                            <div class="form-floating mb-3">
                                <input type="email" id="email_field" name="email" class="form-control fancy-input" placeholder="you@example.com" required>
                                <label for="email_field">Email</label>
                            </div>
                        </div>

                    </div>

                    <div class="form-floating mb-3">
                        <input type="text" id="subject_field" name="subject" class="form-control fancy-input" placeholder="Subject" required>
                        <label for="subject_field">Subject</label>
                    </div>

                    <div class="form-floating mb-4">
                        <textarea id="message_area" name="message" class="form-control fancy-input" style="height: 140px" placeholder="Your message..." required></textarea>
                        <label for="message_area">Message</label>
                    </div>

                    <div class="text-center">
                        <button id="submitBtn" type="submit" class="btn-custom btn-color btn-pill">
                            <span class="btn-spinner" aria-hidden="true"></span>
                            Send Message
                        </button>
                    </div>

                    <div class="form-feedback" aria-live="polite" role="status" id="formFeedback"></div>

                </form>

            </div>
        </div>

    </div>

    <!-- Section Loader Script -->
    <script src="Scripts/loadsection.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            loadsection("about", "about-container");
            loadsection("join", "join-container");
        });
    </script>

</body>

</html>
