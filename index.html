<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>ACM - Student Organization</title>
    <link rel="stylesheet" type="text/css" href="../CSS/style.css">
    <link rel="icon" type="image/png" href="/Images/ACM.png">
    <script src="../Scripts/header.js"></script>
</head>

<body>
    <primary-header></primary-header>

    <!-- Main Content Section -->
    <div class="container">

        <!-- About ACM Section -->
        <div id="about-container"></div>

        <!-- Upcoming Events Section -->
        <section id="events">
            <h2>Upcoming Events</h2>
            <ul id="events-list"></ul>
        </section>

        <!-- Join Us Section -->
        <div id="join-container"></div>

        <!-- Contact Form Section -->
        <div id="contact-container"></div>

    </div>

    <!-- Scripts -->
    <script src="Scripts/loadsection.js"></script>
    <script src="Scripts/loadevents.js"></script>
    <script src="Scripts/loadform.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            // Load sections
            loadsection("about", "about-container");
            loadsection("join", "join-container");

            // Load contact form dynamically
            loadForm("contact-container", "contactForm");
        });
    </script>

</body>
</html>
